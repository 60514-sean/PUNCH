<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>碰器嚴選系統 — 手機版展示</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700;900&family=Noto+Sans+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/base.css">
<style>
html, body { margin:0; padding:0; }
body.showcase { background: #1a1410; min-height: 100vh; font-family: "Noto Sans TC", sans-serif; color: #E8DCC4; padding: 40px 20px 80px; background-image:none; }
.stage-hd { text-align:center; margin-bottom: 40px; }
.stage-hd .eyebrow { font-size: 11px; letter-spacing: 2px; color: #A67B5B; text-transform: uppercase; font-weight: 600; margin-bottom: 8px; }
.stage-hd h1 { font-family: "Noto Serif TC", serif; font-weight: 700; font-size: 34px; color: #F4EADE; margin: 0 0 8px; letter-spacing: 0.02em; }
.stage-hd p { color: #A6998A; font-size: 13px; max-width: 560px; margin: 0 auto; line-height: 1.7; }

.phones { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 402px)); gap: 48px 28px; justify-content: center; max-width: 1800px; margin: 0 auto; }
.phone-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.phone-label { text-align: center; }
.phone-label .num { font-family: "JetBrains Mono", monospace; font-size: 10px; color: #A67B5B; letter-spacing: 1.5px; }
.phone-label .name { font-family: "Noto Serif TC", serif; font-size: 17px; color: #F4EADE; font-weight: 600; margin-top: 3px; }
.phone-label .desc { font-size: 11px; color: #A6998A; margin-top: 4px; }
/* Mobile overrides live in styles/base.css (.in-phone scope) */
</style>
</head>
<body class="showcase">

<div class="stage-hd">
  <div class="eyebrow">Mobile Preview · iPhone 15 Pro</div>
  <h1>碰器嚴選系統 · 手機版</h1>
  <p>響應式介面：頂部品牌列、底部五分頁導航、更多抽屜。點擊任一手機即可互動操作。</p>
</div>

<div class="phones" id="phones"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data/seed-v2.js"></script>
<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/ui.jsx"></script>
<script type="text/babel" src="src/dashboard.jsx"></script>
<script type="text/babel" src="src/orders.jsx"></script>
<script type="text/babel" src="src/finance.jsx"></script>
<script type="text/babel" src="src/products.jsx"></script>
<script type="text/babel" src="src/channels.jsx"></script>
<script type="text/babel" src="src/settings.jsx"></script>
<script type="text/babel" src="frames/ios-frame.jsx"></script>
<script type="text/babel" src="src/showcase.jsx"></script>
</body>
</html>
